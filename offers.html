<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="description" content="Proposal switcher for Galerie Cater Art website concepts."/>
  <title>Galerie Cater Art Proposals</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d0f12;
      --panel: rgba(14, 16, 21, 0.92);
      --panel-border: rgba(255, 255, 255, 0.08);
      --text: #f4efe5;
      --muted: #b6aa93;
      --accent: #d3b16b;
      --accent-strong: #f0d7a2;
      --inactive: rgba(255, 255, 255, 0.08);
      --shadow: 0 24px 60px rgba(0, 0, 0, 0.34);
      --viewer-offset: 122px;
      --viewer-offset-collapsed: 58px;
    }

    * {
      box-sizing: border-box;
    }

    html,
    body {
      margin: 0;
      min-height: 100%;
      background:
        radial-gradient(circle at top left, rgba(110, 31, 42, 0.28), transparent 34%),
        radial-gradient(circle at top right, rgba(26, 46, 128, 0.22), transparent 28%),
        linear-gradient(180deg, #111419 0%, var(--bg) 100%);
      color: var(--text);
      font-family: "Space Grotesk", "Helvetica Neue", Arial, sans-serif;
    }

    body {
      display: flex;
      flex-direction: column;
    }

    .chrome-shell {
      position: sticky;
      top: 0;
      z-index: 20;
      overflow: hidden;
      max-height: 240px;
      opacity: 1;
      transition: max-height 240ms ease, opacity 240ms ease;
    }

    body.chrome-collapsed .chrome-shell {
      max-height: 0;
      opacity: 0;
    }

    .topbar {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 20px;
      align-items: center;
      padding: 18px 82px 18px 24px;
      border-bottom: 1px solid var(--panel-border);
      background: var(--panel);
      backdrop-filter: blur(18px);
      box-shadow: var(--shadow);
    }

    .brand {
      display: flex;
      flex-direction: column;
      gap: 6px;
      min-width: 0;
    }

    .eyebrow {
      margin: 0;
      color: var(--muted);
      font-size: 11px;
      letter-spacing: 0.26em;
      text-transform: uppercase;
    }

    .title-row {
      display: flex;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }

    .title {
      margin: 0;
      font-size: clamp(22px, 3vw, 34px);
      line-height: 1;
      letter-spacing: -0.04em;
    }

    .current-label {
      color: var(--accent);
      font-size: 13px;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .controls {
      display: flex;
      align-items: center;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .proposal-list {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }

    .proposal-button,
    .cycle-button {
      appearance: none;
      border: 1px solid var(--panel-border);
      background: var(--inactive);
      color: var(--text);
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease, color 180ms ease;
    }

    .proposal-button:hover,
    .cycle-button:hover,
    .proposal-button:focus-visible,
    .cycle-button:focus-visible {
      outline: none;
      transform: translateY(-1px);
      border-color: rgba(211, 177, 107, 0.65);
    }

    .proposal-button {
      min-width: 54px;
      padding: 12px 16px;
      border-radius: 999px;
      font-weight: 700;
      font-size: 14px;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .proposal-button span {
      display: block;
      color: var(--muted);
      font-size: 10px;
      letter-spacing: 0.14em;
      margin-top: 6px;
      font-weight: 500;
    }

    .proposal-button.active {
      background: linear-gradient(135deg, rgba(211, 177, 107, 0.22), rgba(240, 215, 162, 0.08));
      border-color: rgba(211, 177, 107, 0.9);
      color: var(--accent-strong);
    }

    .proposal-button.active span {
      color: var(--accent-strong);
    }

    .cycle-button {
      padding: 12px 14px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      letter-spacing: 0.18em;
      text-transform: uppercase;
    }

    .chrome-toggle {
      position: fixed;
      top: 16px;
      right: 18px;
      z-index: 30;
      width: 44px;
      height: 44px;
      border-radius: 999px;
      border: 1px solid var(--panel-border);
      background: rgba(14, 16, 21, 0.96);
      color: var(--accent-strong);
      box-shadow: var(--shadow);
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      line-height: 1;
      cursor: pointer;
      transition: transform 180ms ease, border-color 180ms ease, background 180ms ease;
    }

    .chrome-toggle:hover,
    .chrome-toggle:focus-visible {
      outline: none;
      transform: translateY(-1px);
      border-color: rgba(211, 177, 107, 0.65);
    }

    .viewer-shell {
      flex: 1;
      padding: 18px;
    }

    .viewer-frame {
      width: 100%;
      height: calc(100vh - var(--viewer-offset));
      border: 1px solid var(--panel-border);
      border-radius: 20px;
      background: #0a0a0a;
      box-shadow: var(--shadow);
      transition: height 240ms ease;
    }

    body.chrome-collapsed .viewer-frame {
      height: calc(100vh - var(--viewer-offset-collapsed));
    }

    .help {
      margin: 0;
      color: var(--muted);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--panel);
      border-top: 1px solid var(--panel-border);
      padding: 0 24px 20px;
    }

    @media (max-width: 900px) {
      :root {
        --viewer-offset: 210px;
        --viewer-offset-collapsed: 62px;
      }

      .chrome-shell {
        max-height: 360px;
      }

      .topbar {
        grid-template-columns: 1fr;
        padding-right: 70px;
      }

      .controls,
      .proposal-list {
        justify-content: flex-start;
      }

      .viewer-shell {
        padding: 14px;
      }

      .viewer-frame {
        border-radius: 16px;
      }

      .help {
        padding-left: 14px;
        padding-right: 14px;
      }
    }
  </style>
</head>
<body>
  <div class="chrome-shell" id="chrome-shell">
    <header class="topbar">
      <div class="brand">
        <p class="eyebrow">Client Proposal Viewer</p>
        <div class="title-row">
          <h1 class="title">Galerie Cater Art</h1>
          <div class="current-label" id="current-label">Proposal 1</div>
        </div>
      </div>
      <div class="controls">
        <button class="cycle-button" id="previous-button" type="button">Prev</button>
        <div class="proposal-list" id="proposal-list" aria-label="Website proposals"></div>
        <button class="cycle-button" id="next-button" type="button">Next</button>
      </div>
    </header>

    <p class="help">Use the numbered buttons or left and right arrow keys to cycle through the offers.</p>
  </div>

  <button
    class="chrome-toggle"
    id="chrome-toggle"
    type="button"
    aria-expanded="true"
    aria-controls="chrome-shell"
    aria-label="Hide proposal bar"
    title="Hide proposal bar"
  >↑</button>

  <main class="viewer-shell">
    <iframe
      class="viewer-frame"
      id="proposal-frame"
      title="Website proposal preview"
      loading="eager"
      src="proposal-1.html"
    ></iframe>
  </main>

  <script>
    (function () {
      var proposals = [
        { label: "1", name: "Video Landing", file: "proposal-1.html" },
        { label: "1B", name: "Deep Cobalt", file: "proposal-1-cobalt.html" },
        { label: "1C", name: "Forest Green", file: "proposal-1-forest.html" },
        { label: "1C2", name: "Ivory Vision", file: "proposal-1-forest-ivory.html" },
        { label: "1D", name: "Deep Plum", file: "proposal-1-plum.html" },
        { label: "1E", name: "Sage Garden", file: "proposal-1-sage-rose.html" },
        { label: "2", name: "Manifesto Home", file: "manifesto-home.html" },
        { label: "3", name: "Painting Detail", file: "painting-detail.html" }
      ];

      var frame = document.getElementById("proposal-frame");
      var list = document.getElementById("proposal-list");
      var currentLabel = document.getElementById("current-label");
      var previousButton = document.getElementById("previous-button");
      var nextButton = document.getElementById("next-button");
      var chromeToggle = document.getElementById("chrome-toggle");
      var activeIndex = 0;
      var chromeCollapsed = false;

      function syncChromeToggle() {
        chromeToggle.textContent = chromeCollapsed ? "↓" : "↑";
        chromeToggle.setAttribute("aria-expanded", chromeCollapsed ? "false" : "true");
        chromeToggle.setAttribute("aria-label", chromeCollapsed ? "Show proposal bar" : "Hide proposal bar");
        chromeToggle.title = chromeCollapsed ? "Show proposal bar" : "Hide proposal bar";
      }

      function setChromeCollapsed(nextValue) {
        chromeCollapsed = nextValue;
        document.body.classList.toggle("chrome-collapsed", chromeCollapsed);
        syncChromeToggle();
      }

      function renderButtons() {
        proposals.forEach(function (proposal, index) {
          var button = document.createElement("button");
          button.type = "button";
          button.className = "proposal-button";
          button.dataset.index = String(index);
          button.innerHTML = proposal.label + "<span>" + proposal.name + "</span>";
          button.addEventListener("click", function () {
            setActiveProposal(index);
          });
          list.appendChild(button);
        });
      }

      function syncButtons() {
        var buttons = list.querySelectorAll(".proposal-button");
        buttons.forEach(function (button, index) {
          button.classList.toggle("active", index === activeIndex);
          button.setAttribute("aria-pressed", index === activeIndex ? "true" : "false");
        });
      }

      function setActiveProposal(index) {
        activeIndex = (index + proposals.length) % proposals.length;
        frame.src = proposals[activeIndex].file;
        currentLabel.textContent = "Proposal " + proposals[activeIndex].label + " - " + proposals[activeIndex].name;
        syncButtons();
        window.location.hash = "proposal-" + proposals[activeIndex].label;
      }

      function setFromHash() {
        var hash = window.location.hash.replace("#proposal-", "");
        var matchedIndex = proposals.findIndex(function (proposal) {
          return proposal.label === hash;
        });
        if (matchedIndex >= 0) {
          setActiveProposal(matchedIndex);
          return true;
        }
        return false;
      }

      previousButton.addEventListener("click", function () {
        setActiveProposal(activeIndex - 1);
      });

      nextButton.addEventListener("click", function () {
        setActiveProposal(activeIndex + 1);
      });

      chromeToggle.addEventListener("click", function () {
        setChromeCollapsed(!chromeCollapsed);
      });

      document.addEventListener("keydown", function (event) {
        if (event.key === "ArrowLeft") {
          setActiveProposal(activeIndex - 1);
        }
        if (event.key === "ArrowRight") {
          setActiveProposal(activeIndex + 1);
        }
      });

      window.addEventListener("hashchange", function () {
        setFromHash();
      });

      renderButtons();
      syncChromeToggle();
      if (!setFromHash()) {
        setActiveProposal(0);
      }
    })();
  </script>
</body>
</html>
